---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: apps
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`n8n.osose.xyz`)
      kind: Rule
      middlewares:
        - name: authentik-forward-auth
      services:
        - name: n8n
          port: 5678
