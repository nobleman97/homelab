# community.proxmox inventory plugin
# Install: ansible-galaxy collection install community.proxmox
#
# Auth is read from env vars — no secrets in this file:
#   export PROXMOX_TOKEN_SECRET="your-secret"
#
# Tag VMs in Proxmox with "k8s_nodes", "k8s_control_plane", or "k8s_workers"
# to match the group names used in the static inventory.
plugin: community.proxmox.proxmox

url: "https://192.168.100.20:8006"
user: "terraform-prov@pve"
token_id: "terraform"
# token_secret is read from $PROXMOX_TOKEN_SECRET automatically

validate_certs: false

want_facts: true
qemu_extended_statuses: true
filters:
  - proxmox_status == "running"

keyed_groups:
  - key: proxmox_tags_parsed
    separator: ""

compose:
  ansible_host: proxmox_ipconfig0.ip | ansible.utils.ipaddr('address')
